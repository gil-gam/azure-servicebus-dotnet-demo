# GitHub Actions workflow for building and validating a .NET 10 application.
# This workflow runs on every push or pull request targeting the main branch.
name: .NET CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same ref when new commits are pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history is useful for tooling and diagnostics.

      # Step 2: Install the .NET SDK (version 10.0.x).
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Optional: Display the installed .NET SDK version for traceability.
      - name: Display .NET info
        run: dotnet --info

      # Step 3: Restore NuGet dependencies for the solution.
      - name: Restore dependencies
        run: dotnet restore

      # Step 4: Build the project in Release mode without restoring again.
      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      # Step 5: Run all tests in Release mode. Continues even if no test projects exist.
      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal --logger "console;verbosity=detailed"